<html lang="pt-BR">
<head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2c-aAVZwwOvo9eO6SXB0KhBIZtNIwg7E",
  authDomain: "teste-1-4c573.firebaseapp.com",
  projectId: "teste-1-4c573",
  storageBucket: "teste-1-4c573.firebasestorage.app",
  messagingSenderId: "22111398197",
  appId: "1:22111398197:web:f923e029b0f3d12a80447c",
  measurementId: "G-WR6D9YQ6JR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._db = db;
window._fbReady = true;
window._collection = collection;
window._addDoc = addDoc;
window._getDocs = getDocs;
window._doc = doc;
window._updateDoc = updateDoc;
window._query = query;
window._orderBy = orderBy;
window._onSnapshot = onSnapshot;

window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020817;color:#e2e8f0;font-family:'Barlow',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
input,textarea{outline:none}input::placeholder,textarea::placeholder{color:#475569}
button{cursor:pointer;transition:opacity .15s}button:active{opacity:.75}
#app{max-width:860px;margin:0 auto;padding:0 0 40px}

.header{background:#0a0f1e;border-bottom:1px solid #1e293b;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px}
.header-icon{background:linear-gradient(135deg,#6366f1,#0ea5e9);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#f1f5f9}

.header-nav{display:flex;gap:6px}
.nav-btn{background:transparent;border:1px solid transparent;border-radius:8px;color:#64748b;padding:6px 12px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600}
.nav-btn.active{background:#1e293b;border-color:#334155;color:#e2e8f0}
.admin-badge{background:#f59e0b20;border:1px solid #f59e0b40;border-radius:6px;padding:3px 8px;font-family:'Space Mono',monospace;font-size:10px;color:#f59e0b}

.content{padding:20px 16px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.badge{font-family:'Space Mono',monospace;font-size:13px;color:#6366f1}

.btn-primary{background:linear-gradient(135deg,#6366f1,#0ea5e9);border:none;border-radius:10px;color:#fff;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;padding:10px 18px}
.btn-secondary{background:none;border:1px solid #334155;border-radius:8px;color:#94a3b8;font-family:'Barlow',sans-serif;font-size:13px;padding:8px 16px}
.btn-indigo{background:#6366f1;border:none;border-radius:8px;color:#fff;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;padding:8px 20px}
.btn-green{background:#22c55e;border:none;border-radius:10px;color:#fff;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;padding:9px 16px}

.moto-card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.moto-card:hover{border-color:#6366f1}
.moto-card-ring{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.moto-card-inner{width:36px;height:36px;border-radius:8px;background:#0f172a;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.moto-card-info{flex:1;min-width:0}
.moto-card-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#f1f5f9}
.moto-card-sub{font-family:'Barlow',sans-serif;font-size:12px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.moto-card-tags{display:flex;gap:6px;flex-shrink:0}
.tag-bom{background:#22c55e20;border:1px solid #22c55e40;border-radius:6px;padding:3px 8px;font-family:'Space Mono',monospace;font-size:11px;color:#22c55e}
.tag-ruim{background:#ef444420;border:1px solid #ef444440;border-radius:6px;padding:3px 8px;font-family:'Space Mono',monospace;font-size:11px;color:#ef4444}
.arrow{color:#334155;font-family:'Space Mono',monospace}

.new-moto-box{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:16px}
.new-moto-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field-label{font-family:'Barlow',sans-serif;font-size:12px;color:#64748b;display:block;margin-bottom:4px}
.field-input{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-family:'Space Mono',monospace;font-size:13px;padding:10px 14px;width:100%}
.full-col{grid-column:1/-1}
.form-actions{display:flex;gap:10px;justify-content:flex-end}

.form-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{background:none;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:6px 14px;font-family:'Space Mono',monospace;font-size:12px}
.form-moto-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:#e2e8f0}
.form-moto-sub{font-family:'Space Mono',monospace;font-size:11px;color:#64748b}
.progress-wrap{background:#1e293b;border-radius:4px;height:4px;margin-bottom:16px}
.progress-bar{height:100%;border-radius:4px;transition:width .3s}
.pct-label{font-family:'Space Mono',monospace;font-size:16px;font-weight:700}

.section-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.sec-tab{background:#0f172a;border:1px solid #1e293b;border-radius:8px;color:#94a3b8;padding:6px 10px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.sec-tab.active{background:#6366f1;border-color:#6366f1;color:#fff}
.sec-count{background:#334155;border-radius:10px;font-size:10px;padding:1px 6px;color:#fff;font-family:'Space Mono',monospace}
.sec-count.done{background:#22c55e}
.sec-heading{font-family:'Barlow Condensed',sans-serif;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}

.check-item{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #1e293b;transition:border-left-color .2s}
.check-item-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:space-between}
.check-item-label{color:#e2e8f0;font-size:14px;flex:1;min-width:140px}
.rating-btns{display:flex;gap:5px;flex-wrap:wrap}
.rating-btn{border-radius:6px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;border:2px solid #334155;background:transparent;color:#94a3b8;min-width:44px}
.check-item-bottom{margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.obs-input{flex:1;min-width:140px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#cbd5e1;font-family:'Space Mono',monospace;font-size:12px;padding:6px 10px}
.photo-btn{background:#1e293b;border:1px solid #334155;border-radius:6px;color:#94a3b8;font-family:'Space Mono',monospace;font-size:11px;padding:6px 10px;white-space:nowrap}
.photos-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb{width:64px;height:64px;object-fit:cover;border-radius:6px;border:2px solid #1e293b;display:block}
.photo-remove{position:absolute;top:-6px;right:-6px;background:#ef4444;border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}

.submit-btn-wrap{margin-top:20px;text-align:center}
.submit-btn{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;color:#fff;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;padding:14px 40px;width:100%}

.stat-cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{flex:1;min-width:110px;background:#0f172a;border-radius:12px;padding:14px 16px;border-top:3px solid}
.stat-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700}
.stat-lbl{font-family:'Barlow',sans-serif;font-size:11px;color:#64748b;margin-top:4px}
.charts-row{display:flex;gap:16px;flex-wrap:wrap}
.chart-box{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px}
.chart-box.wide{flex:2;min-width:260px}
.chart-box.narrow{flex:1;min-width:220px}
.chart-title{font-family:'Barlow Condensed',sans-serif;color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}

.empty{text-align:center;padding:60px 0;color:#334155}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.empty-sub{font-family:'Space Mono',monospace;font-size:12px;margin-top:6px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#0f172a;border:1px solid #334155;border-radius:20px;padding:32px 28px;width:100%;max-width:360px;text-align:center}
.login-icon{font-size:48px;margin-bottom:12px}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.login-sub{font-family:'Space Mono',monospace;font-size:11px;color:#475569;margin-bottom:24px}
.login-input{background:#1e293b;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-family:'Space Mono',monospace;font-size:14px;padding:12px 16px;width:100%;margin-bottom:12px;text-align:center;letter-spacing:2px}
.login-btn{background:linear-gradient(135deg,#6366f1,#0ea5e9);border:none;border-radius:10px;color:#fff;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;padding:12px;width:100%;margin-bottom:16px}
.login-divider{font-family:'Barlow',sans-serif;font-size:12px;color:#334155;margin:8px 0 16px;position:relative}
.login-avaliador-btn{background:none;border:1px solid #334155;border-radius:10px;color:#64748b;font-family:'Barlow',sans-serif;font-size:14px;padding:12px;width:100%}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 20px;font-family:'Space Mono',monospace;font-size:12px;color:#e2e8f0;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.syncing{font-family:'Space Mono',monospace;font-size:10px;color:#6366f1;margin-left:8px}
</style>

<body>

<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-icon">🏍️</div>
      <div class="login-title">NQS Avaliação</div>
      <div class="login-sub">Novos Modelos · 8 meses de uso</div>
      <button class="login-btn" onclick="tryAdmin()">🔐 Entrar como Admin</button>
      <div class="login-divider">— ou —</div>
      <button class="login-avaliador-btn" onclick="enterAvaliador()">📋 Entrar como Avaliador</button>
    </div>
  </div>
</div>

<div id="main-app" style="display:none">
  <div class="header">
    <div class="header-logo">
      <div class="header-icon">🏍️</div>
      <div>
        <div class="header-title">NQS — Avaliação de Campo <span class="syncing" id="sync-label"></span></div>
        <div class="header-sub">Novos Modelos · 8 meses de uso</div>
      </div>
    </div>
    <div class="header-nav" id="header-nav"></div>
  </div>
  <div id="app"><div class="content" id="main-content"></div></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
<input type="file" id="video-input" accept="video/*" capture="environment" style="display:none" onchange="handleVideo(event)">

<script>
const SECTIONS=[
  {id:"motor",label:"Motor",icon:"⚙️",items:[
    {id:"motor_oleo",label:"Nível e condição do óleo"},
    {id:"motor_vazamento",label:"Vazamentos (óleo/fluido)"},
    {id:"motor_ruido",label:"Ruídos anormais"},
    {id:"motor_partida",label:"Sistema de partida"},
    {id:"motor_aquecimento",label:"Aquecimento excessivo"},
  ]},
];

const RATINGS=[
  {value:"bom",label:"Bom",color:"#22c55e"},
  {value:"regular",label:"Regular",color:"#f59e0b"},
  {value:"ruim",label:"Ruim",color:"#ef4444"},
  {value:"na",label:"N/A",color:"#94a3b8"},
];

const ADMIN_PASS="Thiago";

let state={
  mode:null, // 'admin' | 'avaliador'
  view:"list",
  motos:[],
  currentMotoId:null,
  activeSection:"motor",
  showNewMoto:false,
  newMoto:{modelo:"",placa:"",cliente:"",km:"",consessionaria:""},
};
let barChart=null,pieChart=null;
let _photoTarget={motoId:null,itemId:null};
let _unsubscribe=null;

// ---- TOAST ----
function toast(msg,duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

// ---- LOGIN ----
function tryAdmin(){
  state.mode='admin';
  startApp();
}
function enterAvaliador(){
  state.mode='avaliador';
  startApp();
}

function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  buildNav();
  subscribeMotos();
  render();
}

function buildNav(){
  const nav=document.getElementById('header-nav');
  if(state.mode==='admin'){
    nav.innerHTML=`
      <span class="admin-badge">ADMIN</span>
      <button class="nav-btn active" id="nav-list" onclick="goView('list')">🏍️ Motos</button>
      <button class="nav-btn" id="nav-fotos" onclick="goView('fotos')">📁 Fotos</button>
      <button class="nav-btn" id="nav-dashboard" onclick="goView('dashboard')">📊 Gráficos</button>
    `;
  } else {
    nav.innerHTML=`
      <button class="nav-btn active" id="nav-list" onclick="goView('list')">🏍️ Minhas Avaliações</button>
    `;
  }
}

// ---- FIREBASE ----
function subscribeMotos(){
  if(!window._fbReady){
    window.addEventListener('firebase-ready',subscribeMotos,{once:true});
    return;
  }
  document.getElementById('sync-label').textContent='● online';
  const q=window._query(window._collection(window._db,'motos'),window._orderBy('createdAt','desc'));
  _unsubscribe=window._onSnapshot(q,(snap)=>{
    state.motos=snap.docs.map(d=>({id:d.id,...d.data()}));
    // merge firebase data with local photos (cloudinary URLs already in firebase)
    state.motos=snap.docs.map(d=>{
      const fbData={id:d.id,...d.data()};
      // restore cloudinary photo URLs into evaluations
      const evals={};
      Object.entries(fbData.evaluations||{}).forEach(([k,v])=>{
        evals[k]={...v, photos:(v.photos||[])};
      });
      fbData.evaluations=evals;
      return fbData;
    });
    render();
  });
}

async function saveMotoToFirebase(moto){
  if(!window._fbReady) return null;
  try{
    const {id,...data}=moto;
    const ref=await window._addDoc(window._collection(window._db,'motos'),{...data,createdAt:new Date().toISOString()});
    return ref.id;
  } catch(e){
    toast("Erro ao salvar: "+e.message);
    return null;
  }
}

async function updateMotoInFirebase(moto){
  if(!window._fbReady||!moto.id) return;
  try{
    const {id,...data}=moto;
    // strip photos from firestore (too large), store separately in state
    const dataToSave={...data};
    // save photo URLs (cloudinary URLs are safe to store in firestore)
    const evalsCleaned={};
    Object.entries(data.evaluations||{}).forEach(([k,v])=>{
      evalsCleaned[k]={rating:v.rating||"",obs:v.obs||"",photos:(v.photos||[]).filter(p=>p.startsWith("http")),videos:(v.videos||[]).filter(p=>p.startsWith("http"))};
    });
    dataToSave.evaluations=evalsCleaned;
    await window._updateDoc(window._doc(window._db,'motos',id),dataToSave);
  } catch(e){
    console.warn("Firebase update error:",e);
  }
}

// ---- STATE ----
function goView(v){
  state.view=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('nav-'+v);
  if(btn) btn.classList.add('active');
  render();
}

function progress(moto){
  let total=0,filled=0,bom=0,ruim=0;
  SECTIONS.forEach(s=>s.items.forEach(item=>{
    total++;
    const ev=(moto.evaluations||{})[item.id];
    if(ev?.rating){filled++;if(ev.rating==="bom")bom++;if(ev.rating==="ruim")ruim++;}
  }));
  return{total,filled,bom,ruim,pct:Math.round(filled/total*100)};
}

function render(){
  const c=document.getElementById('main-content');
  if(state.view==='list') renderList(c);
  else if(state.view==='form') renderForm(c);
  else if(state.view==='fotos') renderFotos(c);
  else if(state.view==='dashboard') renderDashboard(c);
}

// ---- LIST ----
function renderList(c){
  const motos=state.mode==='admin'?state.motos:state.motos.filter(m=>m._localId||m.avaliador===state.sessionId);
  const allMotos=state.mode==='admin'?state.motos:motos;

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="section-title">
      ${state.mode==='admin'?"Todas as Avaliações":"Minhas Avaliações"}
      <span class="badge">${allMotos.length}</span>
    </div>
    <button class="btn-primary" onclick="setState({showNewMoto:true})">+ Nova Moto</button>
  </div>`;

  if(state.showNewMoto){
    const nm=state.newMoto;
    html+=`<div class="new-moto-box">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Nova Avaliação</div>
      <div class="new-moto-grid">
        <div><label class="field-label">Modelo da Moto *</label><input class="field-input" value="${nm.modelo}" oninput="state.newMoto.modelo=this.value" placeholder="Ex: Factor 150"></div>
        <div><label class="field-label">Placa</label><input class="field-input" value="${nm.placa}" oninput="state.newMoto.placa=this.value" placeholder="ABC-1234"></div>
        <div><label class="field-label">Nome do Cliente</label><input class="field-input" value="${nm.cliente}" oninput="state.newMoto.cliente=this.value" placeholder="Nome completo"></div>
        <div><label class="field-label">Km Rodados</label><input class="field-input" value="${nm.km}" oninput="state.newMoto.km=this.value" placeholder="Ex: 2300"></div>
        <div class="full-col"><label class="field-label">Concessionária</label><input class="field-input" value="${nm.consessionaria}" oninput="state.newMoto.consessionaria=this.value" placeholder="Nome da concessionária"></div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="setState({showNewMoto:false})">Cancelar</button>
        <button class="btn-indigo" onclick="addMoto()">Iniciar Avaliação →</button>
      </div>
    </div>`;
  }

  if(allMotos.length===0&&!state.showNewMoto){
    html+=`<div class="empty"><div class="empty-icon">🏍️</div><div class="empty-title">Nenhuma avaliação ainda</div><div class="empty-sub">Toque em "+ Nova Moto" para começar</div></div>`;
  }

  allMotos.forEach(moto=>{
    const p=progress(moto);
    const sc=p.pct===100?"#22c55e":p.pct>50?"#f59e0b":"#6366f1";
    const deg=p.pct*3.6;
    const submitted=moto.submitted?"✅ Enviada":"⏳ Em andamento";
    html+=`<div class="moto-card" onclick="openMoto('${moto.id}')">
      <div class="moto-card-ring" style="background:conic-gradient(${sc} ${deg}deg,#1e293b 0deg)">
        <div class="moto-card-inner pct-label" style="color:${sc}">${p.pct}%</div>
      </div>
      <div class="moto-card-info">
        <div class="moto-card-name">${moto.modelo||""}${moto.placa?` <span style="font-family:'Space Mono',monospace;font-size:11px;color:#475569">${moto.placa}</span>`:""}</div>

// Compress image before upload
function compressImage(file,maxWidth=1280,quality=0.72){
  return new Promise((resolve)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(blob),'image/jpeg',quality);
    };
    img.src=url;
  });
}

async function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  e.target.value="";
  toast("🗜️ Comprimindo foto...",5000);
  try{
    const compressed=await compressImage(file,1280,0.72);
    const sizeAfter=(compressed.size/1024).toFixed(0);
    toast("📤 Enviando foto ("+sizeAfter+"KB)...",8000);
    const formData=new FormData();
    formData.append("file",compressed,"foto.jpg");
    formData.append("upload_preset",CLOUDINARY_PRESET);
    formData.append("folder","nqs");
    const res=await fetch("https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/image/upload",{method:"POST",body:formData});
    const data=await res.json();
    if(!data.secure_url) throw new Error(data.error?.message||"Falha no upload");
    const moto=state.motos.find(m=>m.id===_photoTarget.motoId);if(!moto)return;
    const evData=(moto.evaluations||{})[_photoTarget.itemId]||{};
    const photos=[...(evData.photos||[]),data.secure_url];

    state.motos=state.motos.map(m=>m.id===_photoTarget.motoId?{...m,evaluations:updatedEvals}:m);
    updateMotoInFirebase({...moto,evaluations:updatedEvals});
    render();
    toast("✅ Foto salva! ("+sizeAfter+"KB)");
  } catch(err){
    toast("Erro no upload: "+err.message);
  }
}

function startVideoRecorder(motoId,itemId){
  // show recorder modal
  const overlay=document.createElement('div');
  overlay.id='video-recorder-overlay';
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';

  const preview=document.createElement('video');
  preview.autoplay=true;preview.muted=true;preview.playsInline=true;
  preview.style.cssText='width:100%;max-height:60vh;object-fit:cover';

  const statusEl=document.createElement('div');
  statusEl.style.cssText="font-family:'Space Mono',monospace;font-size:13px;color:#fff;padding:8px 16px;background:#ef4444;border-radius:20px;display:none";
  statusEl.textContent='● GRAVANDO';

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:12px';

  const recordBtn=document.createElement('button');
  recordBtn.textContent='⏺ Gravar';
  recordBtn.style.cssText='background:#ef4444;border:none;border-radius:12px;color:#fff;font-family:Barlow,sans-serif;font-weight:700;font-size:15px;padding:14px 28px';

  const cancelBtn=document.createElement('button');
  cancelBtn.textContent='Cancelar';
  cancelBtn.style.cssText='background:#334155;border:none;border-radius:12px;color:#fff;font-family:Barlow,sans-serif;font-size:14px;padding:14px 20px';

  btnRow.appendChild(recordBtn);btnRow.appendChild(cancelBtn);
  overlay.appendChild(preview);overlay.appendChild(statusEl);overlay.appendChild(btnRow);
  document.body.appendChild(overlay);

  let stream,recorder,chunks=[];

  navigator.mediaDevices.getUserMedia({
    video:{width:{ideal:1280},height:{ideal:720},facingMode:"environment"},
    audio:true
  }).then(s=>{
    stream=s;
    preview.srcObject=s;
    let recording=false;

    recordBtn.onclick=()=>{
      if(!recording){
        // start recording
        chunks=[];
        recorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp8,opus'});
        recorder.ondataavailable=e=>chunks.push(e.data);
        recorder.onstop=async()=>{
          const blob=new Blob(chunks,{type:'video/webm'});
          document.body.removeChild(overlay);
          stream.getTracks().forEach(t=>t.stop());
          // upload
          toast("📤 Enviando vídeo...",15000);
          try{
            const formData=new FormData();
            formData.append("file",blob,"video.webm");
            formData.append("upload_preset",CLOUDINARY_PRESET);
            formData.append("folder","nqs/videos");
            formData.append("resource_type","video");
            const res=await fetch("https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/video/upload",{method:"POST",body:formData});
            const data=await res.json();
            if(!data.secure_url) throw new Error(data.error?.message||"Falha");
            const moto=state.motos.find(m=>m.id===_photoTarget.motoId);if(!moto)return;
            const evData=(moto.evaluations||{})[_photoTarget.itemId]||{};
            const videos=[...(evData.videos||[]),data.secure_url];
            const updatedEvals={...(moto.evaluations||{}),[_photoTarget.itemId]:{...evData,videos}};
            state.motos=state.motos.map(m=>m.id===_photoTarget.motoId?{...m,evaluations:updatedEvals}:m);
            updateMotoInFirebase({...moto,evaluations:updatedEvals});
            render();
            toast("✅ Vídeo salvo na nuvem!");
          } catch(err){toast("Erro: "+err.message);}
        };
        recorder.start();
        recording=true;
        recordBtn.textContent='⏹ Parar';
        recordBtn.style.background='#f59e0b';
        statusEl.style.display='block';
      } else {
        recorder.stop();
        recording=false;
      }
    };

    cancelBtn.onclick=()=>{
      if(recorder&&recorder.state==='recording') recorder.stop();
      stream.getTracks().forEach(t=>t.stop());
      document.body.removeChild(overlay);
    };
  }).catch(()=>{
    document.body.removeChild(overlay);
    // fallback to file input
    document.getElementById('video-input').click();
  });
}

async function submitMoto(motoId){
  const moto=state.motos.find(m=>m.id===motoId);if(!moto)return;
  const p=progress(moto);
  if(p.filled===0){toast("Preencha ao menos um item antes de enviar");return;}

  const btn=document.querySelector('.submit-btn');
  if(btn){btn.textContent="⏳ Baixando fotos...";btn.disabled=true;}

  try{
    const zip=new JSZip();
    const folderName=((moto.modelo||"moto")+"_"+(moto.placa||moto.id)).replace(/[^a-zA-Z0-9_\-]/g,"_");
    const motoFolder=zip.folder(folderName);
    const rows=[["Modelo","Placa","Cliente","Km","Concessionaria","Data","Secao","Item","Avaliacao","Observacao","Fotos"]];

    // download all photos from Cloudinary and add to zip
    const photoPromises=[];
    SECTIONS.forEach(sec=>{
      sec.items.forEach(item=>{
        const ev=(moto.evaluations||{})[item.id]||{};
        const photos=ev.photos||[];
        photos.forEach((url,idx)=>{
          if(url.startsWith("http")){
            const ext=url.split(".").pop().split("?")[0]||"jpg";
            const fname=`${item.id.replace(/_/g,"-")}_foto${idx+1}.${ext}`;
            photoPromises.push(
              fetch("https://corsproxy.io/?"+encodeURIComponent(url))
                .then(r=>r.arrayBuffer())
                .then(buf=>{motoFolder.file(fname,buf);return {itemId:item.id,fname};})
                .catch(()=>{
                  // if download fails, save URL as text reference
                  motoFolder.file(item.id.replace(/_/g,"-")+`_foto${idx+1}.txt`,"URL: "+url);
                  return {itemId:item.id,fname:item.id.replace(/_/g,"-")+`_foto${idx+1}.txt`};
                })
            );
          }
        });
      });
    });

    if(btn) btn.textContent="⏳ Gerando ZIP...";
    const photoResults=await Promise.all(photoPromises);

    // build photo name map
    const photoMap={};
    photoResults.forEach(({itemId,fname})=>{
      if(!photoMap[itemId]) photoMap[itemId]=[];
      photoMap[itemId].push(fname);
    });

    SECTIONS.forEach(sec=>{
      sec.items.forEach(item=>{
        const ev=(moto.evaluations||{})[item.id]||{};
        const names=photoMap[item.id]||[];
        rows.push([
          moto.modelo||"",moto.placa||"",moto.cliente||"",moto.km||"",
          moto.consessionaria||"",
          new Date().toLocaleDateString("pt-BR"),
          sec.label,item.label,
          ev.rating||"",
          (ev.obs||"").replace(/"/g,'""'),
          names.length>0?folderName+"/"+names.join(" | "):"",
        ]);
      });
    });

    const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${v}"`).join(";")).join("\r\n");
    zip.file("avaliacao.csv",csv);
    zip.file("LEIA-ME.txt","NQS — Avaliação de Motocicleta\n\nModelo: "+(moto.modelo||"")+"\nPlaca: "+(moto.placa||"")+"\nCliente: "+(moto.cliente||"")+"\nData: "+new Date().toLocaleDateString("pt-BR")+"\n\nConteúdo:\n- avaliacao.csv → Abra no Excel\n- Pasta "+folderName+" → Fotos organizadas por item\n");

    const blob=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const zipName=`NQS_${folderName}_${new Date().toISOString().slice(0,10)}.zip`;

    // download ZIP
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=zipName;a.click();
    URL.revokeObjectURL(url);

    // mark as submitted
    const updated={...moto,submitted:true,submittedAt:new Date().toISOString()};
    state.motos=state.motos.map(m=>m.id===motoId?updated:m);
    await updateMotoInFirebase(updated);

    // open WhatsApp
    setTimeout(()=>{
      const msg=encodeURIComponent(
        "🏍️ *NQS — Avaliação de Motocicleta*\n\n"+
        "*Modelo:* "+(moto.modelo||"")+"\n"+
        "*Placa:* "+(moto.placa||"")+"\n"+
        "*Cliente:* "+(moto.cliente||"")+"\n"+
        "*Data:* "+new Date().toLocaleDateString("pt-BR")+"\n\n"+
        "Segue em anexo o arquivo ZIP com a avaliação completa e fotos ("+folderName+").\n"+
        "Arquivo: "+zipName
      );
      window.open("https://wa.me/5511962861606?text="+msg,"_blank");
    },800);

    toast("✅ ZIP gerado com fotos! Envie pelo WhatsApp.");
    render();

  } catch(e){
    toast("Erro: "+e.message);
    if(btn){btn.textContent="✅ Finalizar e Enviar Avaliação";btn.disabled=false;}
  }
}

    });

    if(allPhotos.length===0) return;

    const folderName=((moto.modelo||"moto")+"_"+(moto.placa||moto.id)).replace(/[^a-zA-Z0-9_\-]/g,"_");

    html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#f1f5f9">${moto.modelo||""} ${moto.placa?`<span style="font-family:'Space Mono',monospace;font-size:11px;color:#475569">${moto.placa}</span>`:""}
          </div>
          <div style="font-family:'Barlow',sans-serif;font-size:12px;color:#64748b">${moto.cliente||""} · ${allPhotos.length} foto(s)</div>
        </div>
        <button onclick="downloadFolderZip('${moto.id}')" style="background:#6366f1;border:none;border-radius:8px;color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;padding:8px 14px;display:flex;align-items:center;gap:6px">
          📤 Compartilhar pasta
        </button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">`;

    allPhotos.forEach((p,idx)=>{
      html+=`<div style="position:relative;text-align:center">
        <img src="${p.url}" onclick="openPhoto('${p.url}')"
          style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #1e293b;display:block;cursor:zoom-in">
        <div style="font-family:'Barlow',sans-serif;font-size:9px;color:#64748b;margin-top:3px;max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.label}</div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  c.innerHTML=html;
}

function openPhoto(url){
  // open full screen photo viewer
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column';
  overlay.onclick=()=>document.body.removeChild(overlay);
  
  const img=document.createElement('img');
  img.src=url;
  img.style.cssText='max-width:95%;max-height:80vh;object-fit:contain;border-radius:8px';
  
  const hint=document.createElement('div');
  hint.textContent='Toque para fechar';
  hint.style.cssText="font-family:'Space Mono',monospace;font-size:11px;color:#475569;margin-top:12px";

  const shareBtn=document.createElement('button');
  shareBtn.textContent='📤 Compartilhar foto';
  shareBtn.style.cssText='margin-top:12px;background:#6366f1;border:none;border-radius:8px;color:#fff;font-family:Barlow,sans-serif;font-size:13px;font-weight:700;padding:10px 20px';
  shareBtn.onclick=(e)=>{
    e.stopPropagation();
    if(navigator.share){
      navigator.share({title:'Foto NQS',url}).catch(()=>{});
    } else {
      window.open(url,'_blank');
    }
  };

  overlay.appendChild(img);
  overlay.appendChild(hint);
  overlay.appendChild(shareBtn);
  document.body.appendChild(overlay);
}

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  overlay.onclick=(e)=>{if(e.target===overlay)document.body.removeChild(overlay);};

  overlay.innerHTML=`
    <div style="background:#0f172a;border:1px solid #334155;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:6px">📤 Compartilhar Pasta</div>

      <div style="display:flex;flex-direction:column;gap:10px">

function openFilesApp(){
  // try to open downloads folder
  window.open('content://com.android.externalstorage.documents/document/primary:Download','_blank');
}

async function downloadFolderZip(motoId){
  const moto=state.motos.find(m=>m.id===motoId);if(!moto)return;
  toast("⏳ Preparando pasta...",8000);

  try{
    const zip=new JSZip();
    const folderName=((moto.modelo||"moto")+"_"+(moto.placa||moto.id)).replace(/[^a-zA-Z0-9_\-]/g,"_");
    const folder=zip.folder(folderName);
    const promises=[];

    SECTIONS.forEach(sec=>{
      sec.items.forEach(item=>{
        const ev=(moto.evaluations||{})[item.id]||{};
        (ev.photos||[]).forEach((url,idx)=>{
          if(!url.startsWith("http")) return;
          const ext=url.split(".").pop().split("?")[0]||"jpg";
          const fname=`${sec.label.replace(/[^a-zA-Z]/g,"_")}_${item.id.replace(/_/g,"-")}_foto${idx+1}.${ext}`;
          promises.push(
            fetch("https://corsproxy.io/?"+encodeURIComponent(url))
              .then(r=>r.arrayBuffer())
              .then(buf=>folder.file(fname,buf))
              .catch(()=>folder.file(fname.replace("."+ext,".txt"),"URL: "+url))
          );
        });
      });
    });

    await Promise.all(promises);

    const blob=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const zipName=`NQS_${folderName}_fotos.zip`;

    // download ZIP first
    const dlUrl=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=dlUrl;a.download=zipName;a.click();

    // show share options after download starts
    setTimeout(()=>{
      URL.revokeObjectURL(dlUrl);
      // show share modal
      showShareModal(zipName, moto);
    },1200);
  } catch(e){
    toast("Erro: "+e.message);
  }
}

// ---- DASHBOARD (admin only) ----
function renderDashboard(c){
  if(state.motos.length===0){
    c.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#f1f5f9">Dashboard · Resultados</h2>
    </div>
    <div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Nenhum dado ainda</div><div class="empty-sub">Avalie motos para ver os gráficos</div></div>`;
    return;
  }

  const totals={bom:0,regular:0,ruim:0,na:0};
  const secData={};
  SECTIONS.forEach(s=>{
    secData[s.id]={label:s.label,bom:0,regular:0,ruim:0};
    s.items.forEach(item=>{
      state.motos.forEach(moto=>{
        const ev=(moto.evaluations||{})[item.id];
        if(ev?.rating){
          totals[ev.rating]=(totals[ev.rating]||0)+1;
          if(ev.rating!=="na") secData[s.id][ev.rating]++;
        }
      });
    });
  });

  const total=totals.bom+totals.regular+totals.ruim;
  const pctBom=total>0?Math.round(totals.bom/total*100):0;
  const submitted=state.motos.filter(m=>m.submitted).length;

  c.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#f1f5f9">Dashboard · Resultados</h2>
      <button onclick="exportCSV()" class="btn-green">📥 Exportar CSV</button>
    </div>
    <div class="stat-cards">
      <div class="stat-card" style="border-top-color:#6366f1"><div class="stat-val" style="color:#6366f1">${state.motos.length}</div><div class="stat-lbl">Motos cadastradas</div></div>
      <div class="stat-card" style="border-top-color:#22c55e"><div class="stat-val" style="color:#22c55e">${submitted}</div><div class="stat-lbl">Enviadas</div></div>
      <div class="stat-card" style="border-top-color:#0ea5e9"><div class="stat-val" style="color:#0ea5e9">${pctBom}%</div><div class="stat-lbl">% Bom</div></div>
      <div class="stat-card" style="border-top-color:#ef4444"><div class="stat-val" style="color:#ef4444">${totals.ruim}</div><div class="stat-lbl">Itens Ruim</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-box wide"><div class="chart-title">Resultados por Seção</div><canvas id="barChart" height="200"></canvas></div>
      <div class="chart-box narrow"><div class="chart-title">Distribuição Geral</div><canvas id="pieChart" height="200"></canvas></div>
    </div>
  `;

  if(barChart){barChart.destroy();barChart=null;}
  if(pieChart){pieChart.destroy();pieChart=null;}

  const labels=Object.values(secData).map(s=>s.label);
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Bom',data:Object.values(secData).map(s=>s.bom),backgroundColor:'#22c55e',borderRadius:3},
      {label:'Regular',data:Object.values(secData).map(s=>s.regular),backgroundColor:'#f59e0b'},
      {label:'Ruim',data:Object.values(secData).map(s=>s.ruim),backgroundColor:'#ef4444'},
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{family:'Barlow',size:12}}}},
      scales:{x:{stacked:true,ticks:{color:'#64748b',font:{family:'Barlow',size:11},maxRotation:30},grid:{color:'#1e293b'}},
              y:{stacked:true,ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}
  });

  const pieVals=[totals.bom,totals.regular,totals.ruim,totals.na].filter(v=>v>0);
  const pieLabels=['Bom','Regular','Ruim','N/A'].filter((_,i)=>[totals.bom,totals.regular,totals.ruim,totals.na][i]>0);
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:pieLabels,datasets:[{data:pieVals,backgroundColor:['#22c55e','#f59e0b','#ef4444','#94a3b8'],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{family:'Barlow',size:12}}}}}
  });
}

// ---- EXPORT CSV ----
function exportCSV(){
  if(state.motos.length===0){toast("Nenhuma moto para exportar");return;}
  const rows=[["Modelo","Placa","Cliente","Km","Concessionaria","Data","Enviada","Secao","Item","Avaliacao","Observacao"]];
  state.motos.forEach(moto=>{
    SECTIONS.forEach(sec=>{
      sec.items.forEach(item=>{
        const ev=(moto.evaluations||{})[item.id]||{};
        rows.push([
          moto.modelo||"",moto.placa||"",moto.cliente||"",moto.km||"",
          moto.consessionaria||"",
          moto.createdAt?moto.createdAt.slice(0,10):"",
          moto.submitted?"Sim":"Não",
          sec.label,item.label,
          ev.rating||"",
          (ev.obs||"").replace(/"/g,'""'),
        ]);
      });
    });
  });
  const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${v}"`).join(";")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="nqs-avaliacao-"+new Date().toISOString().slice(0,10)+".csv";a.click();
  URL.revokeObjectURL(url);
  toast("CSV exportado! ✅");
}
